<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factorial Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; max-width: 480px; margin: auto; }
    label, input, button, p { display: block; margin: 12px 0; }
    input { width: 100%; padding: 8px; font-size: 1rem; }
    button { padding: 10px 16px; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>Factorial Calculator</h1>
  <label for="numberInput">Enter a non-negative integer:</label>
  <input id="numberInput" type="number"
         min="0" step="1" value="5">
  <button id="calculateButton">Calculate Factorial</button>
  <p id="result"></p>
  <script src="sample.js"></script>
</body>
</html>
